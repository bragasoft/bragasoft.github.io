expertise:
  title: "Domaines d'Expertise"
  subtitle: "Connaissances techniques approfondies soutenues par plus de 14 ans d'expérience industrielle et 11 ans de recherche académique"
  
  card1:
    title: "Migration Héritage vers Cloud"
    description: "Migration complète des systèmes hérités vers des architectures cloud modernes. Solutions boîte noire et blanche pour VB6, MS Access et systèmes propriétaires."
    items:
      - VB6 vers Java/SpringBoot/Angular+TypeScript
      - MS Access vers applications web modernes
      - Rétro-ingénierie des données
      - Conception d'architecture cloud-native
      - Stratégies de migration sans interruption

  card2:
    title: "Analyse Statique et Métriques"
    description: "Analyseurs personnalisés pour évaluer, mesurer et guider les efforts de modernisation avec des outils industriels."
    items:
      - Analyse compilateur C# (Roslyn)
      - Clang/LLVM pour analyse C/C++
      - Parseurs de langages personnalisés
      - Métriques de complexité de migration
      - Évaluation de la dette technique

  card3:
    title: "Intégration IA (Protocole MCP)"
    description: "Intégration moderne de l'IA dans les systèmes hérités utilisant le Model Context Protocol pour une orchestration fluide."
    items:
      - Implémentation protocole MCP
      - Outils de migration assistée par IA
      - Automatisation intelligente
      - Intégration LLM
      - Migration de données intelligente

  card4:
    title: "Blockchain et Recherche"
    description: "Recherche de pointe en analyse blockchain, contrats intelligents et évolution logicielle."
    items:
      - Analyse Ethereum/Solidity
      - Sécurité des contrats intelligents
      - Langages de requête blockchain
      - Jumeaux logiciels
      - Publications académiques

  card5:
    title: "Modernisation Pilotée par les Données"
    description: "Migration guidée par une rétro-ingénierie et analyse approfondie des données."
    items:
      - Extraction du modèle de données
      - Transformation des données héritées
      - Migration de schéma
      - Évaluation de la qualité des données
      - Conception de pipelines ETL

  card6:
    title: "Systèmes Temps Réel"
    description: "Expérience en robotique, ROS et modernisation des systèmes distribués."
    items:
      - Frameworks ROS/ROSDDS
      - Traitement de données temps réel
      - Architectures distribuées
      - Intégration IoT

