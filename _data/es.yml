services:
  title: "Servicios de Consultoría"
  subtitle: "Consultoría integral para guiar tu camino de modernización, desde la evaluación hasta la ejecución"
  
  service1:
    title: "Consultoría Técnica"
    description: "Evaluación técnica profunda, diseño de arquitectura y guía de implementación para proyectos de modernización complejos."
    
  service2:
    title: "Consultoría Estratégica"
    description: "Planificación estratégica de transformación digital, evaluación de riesgos y desarrollo de roadmap."
    
  service3:
    title: "Consultoría Operativa"
    description: "Optimización de procesos, capacitación de equipos e implementación de metodologías (Agile, KanBan, XP, TDD)."
    
  service4:
    title: "Reclutamiento Técnico"
    description: "Ayuda en entrevistas técnicas, evaluación de candidatos y construcción de equipos para modernización."

projects:
  title: "Proyectos Seleccionados"
  subtitle: "Proyectos industriales y de investigación demostrando experiencia en modernización"
  
  project1:
    title: "Migración Lifeware (2023-Actual)"
    tags: ["Retro-Ingeniería", "Migración Datos", "IA/MCP", "Java", "Oracle"]
    description: "Migración completa del sistema guiada por retro-ingeniería de datos. Integración de IA vía protocolo MCP. Manejo de grandes volúmenes de datos, sistemas distribuidos multithread."
    
  project2:
    title: "PhD: Modernización de Software (2020-2023)"
    tags: ["Tesis PhD", "Métricas Migración", "Access a Web", "Investigación"]
    description: "PhD industrial en INRIA sobre enfoque holístico para migrar sistemas legacy industriales a tecnologías web. Múltiples publicaciones sobre evaluación de riesgos de migración."
    
  project3:
    title: "Berger Levrault: Migración VB6/VBA"
    tags: ["VB6", "Retro-Ingeniería", "Moose-FAMIX", "Migración"]
    description: "Desarrollo de exportador VB6/VBA a Moose-FAMIX para análisis de migración. Definición de tema de tesis industrial."
    
  project4:
    title: "Herramientas de Análisis Blockchain (2016-2020)"
    tags: ["Ethereum", "Solidity", "Pharo", "Investigación"]
    description: "Desarrollo de intérprete Solidity, simulador VM Ethereum con utilitarios de debug, descompilador de bytecode y lenguaje de consulta Ethereum."
    
  project5:
    title: "PhaROS & RoboShop (2012-2014)"
    tags: ["Robótica", "ROS", "Pharo", "Navegación"]
    description: "Framework para desarrollar soluciones robóticas en Pharo Smalltalk sobre ROS. Arquitectura distribuida tiempo real."
    
  project6:
    title: "GSoC: Inferencia de Tipos (2012)"
    tags: ["Pharo", "GSoC", "Análisis Tipos"]
    description: "Proyecto Google Summer of Code implementando sistema de inferencia de tipos concreto para Pharo Smalltalk."

