expertise:
  title: "Áreas de Experiencia"
  subtitle: "Conocimiento técnico profundo respaldado por más de 14 años de experiencia industrial y 11 años de investigación académica"
  
  card1:
    title: "Migración Legacy a Cloud"
    description: "Migración completa de sistemas heredados a arquitecturas cloud modernas. Soluciones de caja negra y blanca para VB6, MS Access y sistemas propietarios."
    items:
      - VB6 a Java/SpringBoot/Angular+TypeScript
      - MS Access a aplicaciones web modernas
      - Retro-ingeniería de datos
      - Diseño de arquitectura cloud-native
      - Estrategias de migración sin downtime

  card2:
    title: "Análisis Estático y Métricas"
    description: "Analizadores personalizados para evaluar, medir y guiar esfuerzos de modernización usando herramientas de grado industrial."
    items:
      - Análisis compilador C# (Roslyn)
      - Clang/LLVM para análisis C/C++
      - Analizadores de lenguajes personalizados
      - Métricas de complejidad de migración
      - Evaluación de deuda técnica

  card3:
    title: "Integración IA (Protocolo MCP)"
    description: "Integración moderna de IA en sistemas legacy usando el Model Context Protocol para orquestación perfecta."
    items:
      - Implementación protocolo MCP
      - Herramientas de migración asistidas por IA
      - Automatización inteligente
      - Integración LLM
      - Migración de datos inteligente

  card4:
    title: "Blockchain e Investigación"
    description: "Investigación de vanguardia en análisis de blockchain, contratos inteligentes y evolución del software."
    items:
      - Análisis Ethereum/Solidity
      - Seguridad de contratos inteligentes
      - Lenguajes de consulta blockchain
      - Gemelos digitales de software
      - Publicaciones académicas

  card5:
    title: "Modernización Basada en Datos"
    description: "Migración guiada por retro-ingeniería y análisis profundo de datos."
    items:
      - Extracción de modelo de datos
      - Transformación de datos legacy
      - Migración de esquema
      - Evaluación de calidad de datos
      - Diseño de pipelines ETL

  card6:
    title: "Sistemas en Tiempo Real"
    description: "Experiencia con robótica, ROS y modernización de sistemas distribuidos."
    items:
      - Frameworks ROS/ROSDDS
      - Procesamiento de datos en tiempo real
      - Arquitecturas distribuidas
      - Integración IoT

