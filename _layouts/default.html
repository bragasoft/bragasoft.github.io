<!doctype html>
<html lang="{{ page.lang | default: site.default_lang }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title }} – {{ site.data.strings[page.lang].site.name }}</title>
  <meta name="description" content="{{ site.data.strings[page.lang].site.tagline }}">
  <link rel="stylesheet" href="{{ '/assets/css/main.scss' | relative_url }}">
  <link rel="icon" href="{{ '/assets/img/logo.svg' | relative_url }}" type="image/svg+xml">
  {% if jekyll.environment == "production" %}
  <!-- Google Analytics placeholder -->
  {% endif %}
</head>
<body class="d-flex flex-column min-vh-100">
  {% include header.html %}
  <main class="flex-fill container py-4">
    {{ content }}
  </main>
  {% include footer.html %}
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="{{ '/assets/js/theme-toggle.js' | relative_url }}"></script>
</body>
</html>
