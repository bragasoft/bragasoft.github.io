<header class="site-header">
  <div class="container">
    <a href="{{ site.baseurl }}/" class="site-logo">
      <span class="logo-text">Braga<span class="highlight">soft</span></span>
    </a>
    
    <nav class="site-nav">
      <button class="menu-toggle" aria-label="Toggle menu">
        <span></span>
        <span></span>
        <span></span>
      </button>
      
      <ul class="nav-menu">
        <li class="lang-switch">
          <a href="{{ site.baseurl }}/en/" {% if page.lang == 'en' %}class="active"{% endif %}>EN</a>
          <span class="lang-sep">|</span>
          <a href="{{ site.baseurl }}/fr/" {% if page.lang == 'fr' %}class="active"{% endif %}>FR</a>
          <span class="lang-sep">|</span>
          <a href="{{ site.baseurl }}/es/" {% if page.lang == 'es' %}class="active"{% endif %}>ES</a>
        </li>
        <li><a href="{{ site.baseurl }}/{{ page.lang }}/">Home</a></li>
        <li><a href="{{ site.baseurl }}/{{ page.lang }}/expertise/">{{ site.data[page.lang].nav.expertise }}</a></li>
        <li><a href="{{ site.baseurl }}/{{ page.lang }}/services/">{{ site.data[page.lang].nav.services }}</a></li>
        <li><a href="{{ site.baseurl }}/{{ page.lang }}/projects/">{{ site.data[page.lang].nav.projects }}</a></li>
        <li><a href="{{ site.baseurl }}/{{ page.lang }}/contact/" class="btn btn-primary">{{ site.data[page.lang].nav.contact }}</a></li>
      </ul>
    </nav>
  </div>
</header>
